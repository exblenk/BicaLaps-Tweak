name: Build DEB (Rootful + Rootless)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-rootful:
    name: Build Rootful DEB
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: theos-sdks-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Rootful
        run: make package
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Rootful DEB
        uses: actions/upload-artifact@v4
        with:
          name: rootful-deb
          path: packages/*.deb

  build-rootless:
    name: Build Rootless DEB
    runs-on: macos-latest
    needs: build-rootful
    steps:
      - uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: theos-sdks-v1

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Rootless
        run: make package THEOS_PACKAGE_SCHEME=rootless
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Rootless DEB
        uses: actions/upload-artifact@v4
        with:
          name: rootless-deb
          path: packages/*.deb
